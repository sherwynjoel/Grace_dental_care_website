<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Grace Dental Care</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 40px 20px;
      background: var(--black);
    }
    .error-code {
      font-family: var(--font-heading);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 2px rgba(196,163,90,0.3);
      margin-bottom: 0;
      letter-spacing: -0.04em;
    }
    .error-title {
      font-family: var(--font-heading);
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      color: var(--white);
      margin-bottom: 16px;
      margin-top: -16px;
    }
    .error-sub {
      font-size: 1rem;
      color: var(--gray);
      max-width: 420px;
      margin: 0 auto 40px;
    }
    .error-links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .error-logo {
      width: 56px;
      height: 56px;
      object-fit: contain;
      border-radius: 12px;
      background: #fff;
      padding: 5px;
      margin-bottom: 32px;
    }
  </style>
</head>
<body>
<div class="error-page">
  <img src="assets/logo.png" alt="Grace Dental Care" class="error-logo" />
  <p class="error-code">404</p>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-sub">Looks like this page has been moved or doesn't exist. Let's get you back on track.</p>
  <div class="error-links">
    <a href="index.html" class="btn btn--gold btn--lg">Go to Homepage</a>
    <a href="contact.html" class="btn btn--outline btn--lg">Book Appointment</a>
    <a href="treatments.html" class="btn btn--outline btn--lg">View Treatments</a>
  </div>
</div>
</body>
</html>
